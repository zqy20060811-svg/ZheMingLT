<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>择明论坛 - 首页</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4a6fa5;
            --secondary-color: #3a5a85;
            --accent-color: #6b8cbe;
            --background-color: #f8f9fa;
            --card-background: #ffffff;
            --text-color: #333333;
            --text-secondary: #666666;
            --border-color: #e9ecef;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
            --radius: 12px;
        }

        [data-theme="dark"] {
            --primary-color: #6b8cbe;
            --secondary-color: #4a6fa5;
            --accent-color: #8ab4f8;
            --background-color: #121212;
            --card-background: #1e1e1e;
            --text-color: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: #333333;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: var(--transition);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0;
            transition: opacity 1s ease;
        }

        [data-theme="dark"] .stars {
            opacity: 1;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle var(--duration, 2s) var(--delay, 0s) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* 品牌展示动画 */
        .brand-showcase {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--background-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: brandShowcase 3s ease forwards;
        }

        .brand-logo {
            font-size: 4rem;
            font-weight: bold;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 20px;
            animation: logoFadeIn 1.5s ease forwards;
        }

        .brand-logo i {
            font-size: 5rem;
            animation: lightbulbGlow 2s ease-in-out infinite alternate;
        }

        .brand-slogan {
            margin-top: 20px;
            font-size: 1.5rem;
            color: var(--text-secondary);
            opacity: 0;
            animation: sloganFadeIn 1s ease forwards 1s;
        }

        @keyframes brandShowcase {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        @keyframes logoFadeIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes lightbulbGlow {
            0% { filter: drop-shadow(0 0 10px var(--primary-color)); }
            100% { filter: drop-shadow(0 0 20px var(--primary-color)); }
        }

        @keyframes sloganFadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 导航栏 */
        .navbar {
            background-color: var(--card-background);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            animation: slideDown 0.8s ease forwards;
            animation-delay: 0.2s;
            opacity: 0;
            padding: 0.75rem 0;
        }

        .navbar-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-brand {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            transition: var(--transition);
        }

        .navbar-brand:hover {
            color: var(--secondary-color);
        }

        .navbar-brand i {
            font-size: 1.8rem;
        }

        /* 搜索框 */
        .search-container {
            position: relative;
            flex: 1;
            max-width: 400px;
            margin: 0 2rem;
        }

        .search-input {
            width: 100%;
            padding: 0.5rem 1rem;
            padding-right: 2.5rem;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            background-color: var(--background-color);
            color: var(--text-color);
            transition: var(--transition);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.1);
        }

        .search-btn {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 0.5rem;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
        }

        .search-btn:hover {
            color: var(--primary-color);
            background-color: rgba(74, 111, 165, 0.1);
        }

        /* 导航菜单 */
        .nav-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-item {
            position: relative;
        }

        .nav-link {
            color: var(--text-color);
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: var(--transition);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-link:hover {
            color: var(--primary-color);
            background-color: rgba(74, 111, 165, 0.1);
        }

        .nav-link.active {
            color: var(--primary-color);
            background-color: rgba(74, 111, 165, 0.1);
        }

        /* 通知图标 */
        .notification-btn {
            position: relative;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.2rem;
            padding: 0.5rem;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
        }

        .notification-btn:hover {
            color: var(--primary-color);
            background-color: rgba(74, 111, 165, 0.1);
        }

        .notification-badge {
            position: absolute;
            top: 0;
            right: 0;
            background-color: #ff4757;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 主题切换按钮 */
        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: var(--transition);
        }

        .theme-toggle:hover {
            color: var(--primary-color);
            background-color: rgba(74, 111, 165, 0.1);
        }

        /* 用户菜单 */
        .user-menu {
            position: relative;
        }

        .user-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            background-color: var(--background-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            cursor: pointer;
            transition: var(--transition);
        }

        .user-btn:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.1);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        /* 分类导航 */
        .category-nav {
            background-color: var(--card-background);
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            white-space: nowrap;
            animation: fadeIn 1s ease forwards;
            animation-delay: 0.8s;
            opacity: 0;
            position: sticky;
            top: 70px;
            z-index: 900;
        }

        .category-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-item {
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            background-color: var(--background-color);
            color: var(--text-color);
            transition: var(--transition);
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .category-item:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-2px);
            border-color: var(--primary-color);
        }

        .category-item.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* 主内容区域 */
        .main-content {
            animation: fadeIn 1s ease forwards;
            animation-delay: 1.2s;
            opacity: 0;
            padding: 2rem 0;
        }

        /* 内容网格 */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
            align-items: start;
        }

        /* 帖子列表 */
        .post-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* 帖子卡片 */
        .post-card {
            background-color: var(--card-background);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: var(--transition);
            animation: fadeInUp 0.8s ease forwards;
            opacity: 0;
            border: 1px solid var(--border-color);
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        .post-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .post-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.75rem;
            transition: var(--transition);
        }

        .post-title a {
            color: var(--text-color);
            text-decoration: none;
            position: relative;
        }

        .post-title a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }

        .post-title a:hover::after {
            width: 100%;
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .author-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .post-content {
            padding: 1.5rem;
        }

        .post-summary {
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .post-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .post-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .post-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .action-btn {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .action-btn:hover {
            color: var(--primary-color);
            transform: translateY(-2px);
        }

        /* 侧边栏 */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .sidebar-card {
            background-color: var(--card-background);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            animation: fadeInRight 0.8s ease forwards;
            opacity: 0;
            border: 1px solid var(--border-color);
        }

        .sidebar-card h5 {
            font-weight: bold;
            margin-bottom: 1rem;
            color: var(--text-color);
            position: relative;
            padding-bottom: 0.5rem;
        }

        .sidebar-card h5::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40px;
            height: 3px;
            background-color: var(--primary-color);
        }

        /* 热门帖子 */
        .hot-posts-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .hot-post-item {
            display: flex;
            gap: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .hot-post-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .hot-post-rank {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            min-width: 24px;
        }

        .hot-post-info {
            flex: 1;
        }

        .hot-post-title {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .hot-post-title a {
            color: var(--text-color);
            text-decoration: none;
            transition: var(--transition);
        }

        .hot-post-title a:hover {
            color: var(--primary-color);
        }

        .hot-post-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* 用户信息卡片 */
        .user-info-card {
            text-align: center;
        }

        .user-avatar-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            margin: 0 auto 1rem;
        }

        .user-name {
            font-weight: bold;
            margin-bottom: 0.25rem;
        }

        .user-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-weight: bold;
            color: var(--primary-color);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* 推荐分类 */
        .category-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .category-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            border-radius: 8px;
            background-color: var(--background-color);
            color: var(--text-color);
            text-decoration: none;
            transition: var(--transition);
        }

        .category-link:hover {
            background-color: rgba(74, 111, 165, 0.1);
            color: var(--primary-color);
            transform: translateX(5px);
        }

        /* 发布帖子按钮 */
        .create-post-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 12px rgba(74, 111, 165, 0.4);
            text-decoration: none;
            transition: var(--transition);
            z-index: 999;
        }

        .create-post-btn:hover {
            background-color: var(--secondary-color);
            color: white;
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(74, 111, 165, 0.5);
        }

        /* 分页 */
        .pagination {
            justify-content: center;
            margin-top: 3rem;
            margin-bottom: 2rem;
        }

        .page-item {
            transition: var(--transition);
        }

        .page-item:hover .page-link {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .page-item.active .page-link {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .page-link {
            color: var(--text-color);
            background-color: var(--card-background);
            border: 1px solid var(--border-color);
            transition: var(--transition);
            border-radius: 8px;
            margin: 0 4px;
        }

        /* 登录提示 */
        .login-prompt {
            text-align: center;
            padding: 6rem 0;
            color: var(--text-secondary);
            animation: fadeIn 1s ease forwards;
            background-color: var(--card-background);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .login-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            margin-top: 1.5rem;
        }

        .login-btn:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 111, 165, 0.4);
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4rem 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 进入动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .content-grid {
                grid-template-columns: 1fr 250px;
                gap: 1.5rem;
            }
        }

        @media (max-width: 992px) {
            .content-grid {
                grid-template-columns: 1fr;
            }

            .sidebar {
                order: -1;
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            }

            .search-container {
                max-width: 300px;
                margin: 0 1rem;
            }
        }

        @media (max-width: 768px) {
            .brand-logo {
                font-size: 2.5rem;
            }

            .brand-logo i {
                font-size: 3rem;
            }

            .brand-slogan {
                font-size: 1.2rem;
            }

            .navbar-container {
                flex-wrap: wrap;
                gap: 1rem;
            }

            .search-container {
                order: 3;
                flex: 1 1 100%;
                margin: 0;
            }

            .nav-menu {
                gap: 0.5rem;
            }

            .nav-link {
                padding: 0.4rem 0.8rem;
                font-size: 0.9rem;
            }

            .post-title {
                font-size: 1.3rem;
            }

            .post-card {
                padding: 1rem;
            }

            .sidebar {
                grid-template-columns: 1fr;
            }

            .create-post-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
                bottom: 20px;
                right: 20px;
            }
        }

        @media (max-width: 576px) {
            .navbar-brand {
                font-size: 1.2rem;
            }

            .navbar-brand i {
                font-size: 1.5rem;
            }

            .nav-menu {
                gap: 0.25rem;
            }

            .nav-link {
                padding: 0.3rem 0.6rem;
                font-size: 0.8rem;
            }

            .user-btn {
                padding: 0.4rem 0.8rem;
                font-size: 0.8rem;
            }

            .user-avatar {
                width: 28px;
                height: 28px;
            }

            .category-item {
                padding: 0.4rem 0.8rem;
                font-size: 0.8rem;
            }

            .post-meta {
                flex-wrap: wrap;
                gap: 0.5rem;
                font-size: 0.8rem;
            }

            .post-actions {
                gap: 1rem;
                font-size: 0.8rem;
            }

            .login-prompt {
                padding: 4rem 0;
            }
        }
    </style>
</head>
<body data-theme="light">
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>

    <!-- 品牌展示 -->
    <div class="brand-showcase">
        <div class="brand-logo">
            <i class="fas fa-lightbulb"></i>
            zheminglt
        </div>
        <div class="brand-slogan">智能论坛，连接你我</div>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container navbar-container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-lightbulb"></i>
                择明论坛
            </a>
            
            <div class="search-container">
                <input type="text" class="search-input" placeholder="搜索帖子、用户...">
                <button class="search-btn">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            
            <div class="nav-menu">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 生成星空背景
        function generateStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 100;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // 随机位置
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                
                // 随机大小
                const size = Math.random() * 3 + 1;
                
                // 随机动画持续时间
                const duration = Math.random() * 3 + 1;
                
                // 随机延迟
                const delay = Math.random() * 2;
                
                star.style.left = `${x}%`;
                star.style.top = `${y}%`;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.setProperty('--duration', `${duration}s`);
                star.style.setProperty('--delay', `${delay}s`);
                
                starsContainer.appendChild(star);
            }
        }

        // 主题切换功能
        function initThemeToggle() {
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;
            const icon = themeToggle.querySelector('i');

            // 从localStorage加载主题
            const savedTheme = localStorage.getItem('theme') || 'light';
            body.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);

            themeToggle.addEventListener('click', function() {
                const currentTheme = body.getAttribute('data-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                
                body.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeIcon(newTheme);
            });

            function updateThemeIcon(theme) {
                if (theme === 'dark') {
                    icon.className = 'fas fa-sun';
                } else {
                    icon.className = 'fas fa-moon';
                }
            }
        }

        // 模拟登录状态，设置token
        function setMockToken() {
            localStorage.setItem('token', 'mock-token-123456');
        }

        // 检查登录状态
        function checkLogin() {
            const token = localStorage.getItem('token');
            if (!token) {
                // 显示登录提示
                const postList = document.getElementById('postList');
                postList.innerHTML = `
                    <div class="login-prompt">
                        <h3>请先登录</h3>
                        <p>您需要登录才能查看帖子</p>
                        <button class="login-btn" onclick="setMockToken(); location.reload();">模拟登录</button>
                    </div>
                `;
                return false;
            }
            return token;
        }

        // 加载分类
        function loadCategories() {
            const categoryContainer = document.querySelector('.category-container');
            categoryContainer.innerHTML += '<div class="loading"><div class="spinner"></div></div>';

            fetch('http://localhost:8080/api/categories')
                .then(response => response.json())
                .then(data => {
                    categoryContainer.innerHTML = '<div class="category-item active" data-id="0">全部</div>';
                    if (data.code === 200) {
                        data.data.forEach(category => {
                            const categoryItem = document.createElement('div');
                            categoryItem.className = 'category-item';
                            categoryItem.dataset.id = category.id;
                            categoryItem.textContent = category.name;
                            categoryItem.addEventListener('click', function() {
                                document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
                                this.classList.add('active');
                                loadPosts(1, this.dataset.id);
                            });
                            categoryContainer.appendChild(categoryItem);
                        });
                    }
                })
                .catch(error => {
                    console.error('加载分类失败:', error);
                    categoryContainer.innerHTML = '<div class="category-item active" data-id="0">全部</div>';
                });
        }

        // 加载帖子列表
        function loadPosts(page = 1, categoryId = 0) {
            const token = checkLogin();
            if (!token) return;

            const postList = document.getElementById('postList');
            postList.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            let url = `http://localhost:8080/api/posts?page=${page}&size=10`;
            if (categoryId > 0) {
                url += `&categoryId=${categoryId}`;
            }

            fetch(url, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 200) {
                    postList.innerHTML = '';

                    if (data.data && data.data.list && data.data.list.length > 0) {
                        data.data.list.forEach((post, index) => {
                            const postCard = document.createElement('div');
                            postCard.className = 'post-card';
                            postCard.style.animationDelay = `${1.4 + index * 0.2}s`;
                            
                            // 随机生成帖子图片
                            const randomImage = `https://picsum.photos/800/400?random=${post.id}`;
                            
                            postCard.innerHTML = `
                                <div class="post-header">
                                    <h3 class="post-title"><a href="post-detail.html?id=${post.id}">${post.title || '无标题'}</a></h3>
                                    <div class="post-meta">
                                        <div class="post-author">
                                            <div class="author-avatar">${post.username ? post.username.charAt(0).toUpperCase() : 'U'}</div>
                                            <span>${post.username || '未知'}</span>
                                        </div>
                                        <span>分类：${post.categoryName || '未分类'}</span>
                                        <span>发布时间：${post.createdAt || '未知'}</span>
                                    </div>
                                </div>
                                <div class="post-content">
                                    <img src="${randomImage}" class="post-image" alt="帖子图片">
                                    <p class="post-summary">${post.summary || '无摘要'}</p>
                                </div>
                                <div class="post-footer">
                                    <div class="post-actions">
                                        <a href="post-detail.html?id=${post.id}" class="action-btn">
                                            <i class="fas fa-eye"></i> ${post.viewCount || 0}
                                        </a>
                                        <a href="post-detail.html?id=${post.id}" class="action-btn">
                                            <i class="fas fa-heart"></i> ${post.likeCount || 0}
                                        </a>
                                        <a href="post-detail.html?id=${post.id}" class="action-btn">
                                            <i class="fas fa-comment"></i> ${post.commentCount || 0}
                                        </a>
                                        <a href="post-detail.html?id=${post.id}" class="action-btn">
                                            <i class="fas fa-share"></i> 分享
                                        </a>
                                    </div>
                                </div>
                            `;
                            postList.appendChild(postCard);
                        });

                        // 生成分页
                        generatePagination(data.data.total, data.data.pages, page);
                    } else {
                        postList.innerHTML = '<div class="login-prompt"><h3>暂无帖子</h3><p>还没有任何帖子，快来发布第一个帖子吧！</p></div>';
                    }
                }
            })
            .catch(error => {
                console.error('加载帖子失败:', error);
                postList.innerHTML = '<div class="login-prompt"><h3>加载失败</h3><p>无法加载帖子，请稍后再试</p></div>';
            });
        }

        // 生成分页
        function generatePagination(total, pages, currentPage) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            // 上一页
            const prevLi = document.createElement('li');
            prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
            prevLi.innerHTML = `<a class="page-link" href="#" onclick="loadPosts(${currentPage - 1})">上一页</a>`;
            pagination.appendChild(prevLi);

            // 页码
            for (let i = 1; i <= pages; i++) {
                const li = document.createElement('li');
                li.className = `page-item ${i === currentPage ? 'active' : ''}`;
                li.innerHTML = `<a class="page-link" href="#" onclick="loadPosts(${i})"><span class="sr-only"></span>${i}</a>`;
                pagination.appendChild(li);
            }

            // 下一页
            const nextLi = document.createElement('li');
            nextLi.className = `page-item ${currentPage === pages ? 'disabled' : ''}`;
            nextLi.innerHTML = `<a class="page-link" href="#" onclick="loadPosts(${currentPage + 1})">下一页</a>`;
            pagination.appendChild(nextLi);
        }

        // 加载热门帖子
        function loadHotPosts() {
            const hotPosts = document.getElementById('hotPosts');
            hotPosts.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            fetch('http://localhost:8080/api/posts?page=1&size=5')
                .then(response => response.json())
                .then(data => {
                    hotPosts.innerHTML = '';
                    if (data.code === 200) {
                        if (data.data && data.data.list && data.data.list.length > 0) {
                            data.data.list.forEach((post, index) => {
                                const hotPostItem = document.createElement('div');
                                hotPostItem.className = 'hot-post-item';
                                hotPostItem.innerHTML = `
                                    <div class="hot-post-rank">${index + 1}</div>
                                    <div class="hot-post-info">
                                        <div class="hot-post-title"><a href="post-detail.html?id=${post.id}">${post.title || '无标题'}</a></div>
                                        <div class="hot-post-meta">
                                            <span>${post.username || '未知'}</span>
                                            <span class="mx-1">·</span>
                                            <span>${post.viewCount || 0} 浏览</span>
                                        </div>
                                    </div>
                                `;
                                hotPosts.appendChild(hotPostItem);
                            });
                        } else {
                            hotPosts.innerHTML = '<div style="text-align: center; padding: 1rem; color: var(--text-secondary);">暂无热门帖子</div>';
                        }
                    }
                })
                .catch(error => {
                    console.error('加载热门帖子失败:', error);
                    hotPosts.innerHTML = '<div style="text-align: center; padding: 1rem; color: var(--text-secondary);">加载失败</div>';
                });
        }

        // 页面加载完成后执行
        window.onload = function() {
            generateStars();
            initThemeToggle();
            loadCategories();
            loadPosts();
            loadHotPosts();
        };
    </script>
