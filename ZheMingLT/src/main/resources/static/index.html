<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>择明论坛 - 首页</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4a6fa5;
            --secondary-color: #3a5a85;
            --background-color: #f8f9fa;
            --card-background: #ffffff;
            --text-color: #333333;
            --text-secondary: #666666;
            --border-color: #e9ecef;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --primary-color: #6b8cbe;
            --secondary-color: #4a6fa5;
            --background-color: #121212;
            --card-background: #1e1e1e;
            --text-color: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: #333333;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: var(--transition);
            overflow-x: hidden;
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0;
            transition: opacity 1s ease;
        }

        [data-theme="dark"] .stars {
            opacity: 1;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle var(--duration, 2s) var(--delay, 0s) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* 品牌展示动画 */
        .brand-showcase {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--background-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: brandShowcase 3s ease forwards;
        }

        .brand-logo {
            font-size: 4rem;
            font-weight: bold;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 20px;
            animation: logoFadeIn 1.5s ease forwards;
        }

        .brand-logo i {
            font-size: 5rem;
            animation: lightbulbGlow 2s ease-in-out infinite alternate;
        }

        .brand-slogan {
            margin-top: 20px;
            font-size: 1.5rem;
            color: var(--text-secondary);
            opacity: 0;
            animation: sloganFadeIn 1s ease forwards 1s;
        }

        @keyframes brandShowcase {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        @keyframes logoFadeIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes lightbulbGlow {
            0% { filter: drop-shadow(0 0 10px var(--primary-color)); }
            100% { filter: drop-shadow(0 0 20px var(--primary-color)); }
        }

        @keyframes sloganFadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 导航栏 */
        .navbar {
            background-color: var(--primary-color);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            animation: slideDown 0.8s ease forwards;
            animation-delay: 0.2s;
            opacity: 0;
        }

        .navbar-brand {
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-brand i {
            font-size: 1.8rem;
        }

        .nav-link {
            color: white;
            font-weight: 500;
            position: relative;
            transition: var(--transition);
        }

        .nav-link:hover {
            color: #e6e6e6;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: white;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* 搜索容器 */
        .search-container {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 10px 40px 10px 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            transition: var(--transition);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-input:focus {
            outline: none;
            background-color: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
        }

        .search-btn {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 50%;
            transition: var(--transition);
        }

        .search-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* 主题切换按钮 */
        .theme-toggle {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 50%;
            transition: var(--transition);
        }

        .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* 分类导航 */
        .category-nav {
            background-color: var(--card-background);
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            white-space: nowrap;
            animation: fadeIn 1s ease forwards;
            animation-delay: 0.8s;
            opacity: 0;
        }

        .category-item {
            display: inline-block;
            margin-right: 15px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 20px;
            background-color: var(--background-color);
            color: var(--text-color);
            transition: var(--transition);
            border: 1px solid var(--border-color);
        }

        .category-item:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }

        .category-item.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* 主内容区域 */
        .main-content {
            animation: fadeIn 1s ease forwards;
            animation-delay: 1.2s;
            opacity: 0;
        }

        /* 帖子卡片 */
        .post-card {
            background-color: var(--card-background);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 24px;
            transition: var(--transition);
            animation: fadeInUp 0.8s ease forwards;
            opacity: 0;
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        .post-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 12px;
            transition: var(--transition);
        }

        .post-title a {
            color: var(--text-color);
            text-decoration: none;
            position: relative;
        }

        .post-title a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }

        .post-title a:hover::after {
            width: 100%;
        }

        .post-summary {
            color: var(--text-secondary);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .post-meta {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* 帖子头部 */
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .author-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .author-info {
            display: flex;
            flex-direction: column;
        }

        .author-name {
            font-weight: 500;
            color: var(--text-color);
            font-size: 14px;
        }

        .post-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .post-category {
            display: flex;
            align-items: center;
        }

        .category-tag {
            padding: 4px 12px;
            border-radius: 12px;
            background-color: var(--primary-color);
            color: white;
            font-size: 12px;
            font-weight: 500;
        }

        /* 帖子图片 */
        .post-image {
            margin: 15px 0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .post-image img {
            width: 100%;
            height: auto;
            transition: var(--transition);
        }

        .post-image img:hover {
            transform: scale(1.02);
        }

        .post-actions {
            display: flex;
            gap: 20px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .action-btn {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: var(--transition);
        }

        .action-btn:hover {
            color: var(--primary-color);
            transform: translateY(-2px);
        }

        /* 侧边栏 */
        .sidebar-card {
            background-color: var(--card-background);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 20px;
            margin-bottom: 24px;
            animation: fadeInRight 0.8s ease forwards;
            opacity: 0;
        }

        .sidebar-card h5 {
            font-weight: bold;
            margin-bottom: 16px;
            color: var(--text-color);
            position: relative;
            padding-bottom: 8px;
        }

        .sidebar-card h5::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40px;
            height: 3px;
            background-color: var(--primary-color);
        }

        .list-group-item {
            background-color: transparent;
            border: none;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .list-group-item:last-child {
            border-bottom: none;
        }

        .list-group-item a {
            color: var(--text-color);
            text-decoration: none;
            transition: var(--transition);
        }

        .list-group-item a:hover {
            color: var(--primary-color);
            padding-left: 10px;
        }

        /* 用户信息卡片 */
        .user-info {
            text-align: center;
        }

        .user-avatar {
            font-size: 4rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            transition: var(--transition);
        }

        .user-avatar:hover {
            transform: scale(1.1);
        }

        .user-details h6 {
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 5px;
        }

        .user-email {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .user-stats {
            display: flex;
            justify-content: space-around;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            display: block;
            font-weight: bold;
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .stat-label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 推荐分类 */
        #recommendedCategories .list-group-item a {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #recommendedCategories .list-group-item i {
            color: var(--primary-color);
            width: 20px;
        }

        /* 社交链接 */
        .social-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--background-color);
            color: var(--text-color);
            transition: var(--transition);
            text-decoration: none;
        }

        .social-link:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-3px);
        }

        /* 发布帖子按钮 */
        .create-post-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow);
            text-decoration: none;
            transition: var(--transition);
            z-index: 999;
        }

        .create-post-btn:hover {
            background-color: var(--secondary-color);
            color: white;
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        /* 分页 */
        .pagination {
            justify-content: center;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .page-item {
            transition: var(--transition);
        }

        .page-item:hover .page-link {
            background-color: var(--primary-color);
            color: white;
        }

        .page-item.active .page-link {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .page-link {
            color: var(--text-color);
            background-color: var(--card-background);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        /* 登录提示 */
        .login-prompt {
            text-align: center;
            padding: 80px 0;
            color: var(--text-secondary);
            animation: fadeIn 1s ease forwards;
        }

        .login-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            margin-top: 20px;
        }

        .login-btn:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 进入动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .brand-logo {
                font-size: 2.5rem;
            }

            .brand-logo i {
                font-size: 3rem;
            }

            .brand-slogan {
                font-size: 1.2rem;
            }

            .search-container {
                max-width: 100%;
                margin: 10px 0;
            }

            .post-title {
                font-size: 1.3rem;
            }

            .post-card {
                padding: 20px;
            }

            .post-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .user-stats {
                flex-direction: column;
                gap: 10px;
            }

            .stat-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .create-post-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
                bottom: 20px;
                right: 20px;
            }
        }
    </style>
</head>

        </div>
    </div>

    <!-- 发布帖子按钮 -->
    <a href="create-post.html" class="create-post-btn">
        <i class="fas fa-plus"></i>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 生成星空背景
        function generateStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 100;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // 随机位置
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                
                // 随机大小
                const size = Math.random() * 3 + 1;
                
                // 随机动画持续时间
                const duration = Math.random() * 3 + 1;
                
                // 随机延迟
                const delay = Math.random() * 2;
                
                star.style.left = `${x}%`;
                star.style.top = `${y}%`;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.setProperty('--duration', `${duration}s`);
                star.style.setProperty('--delay', `${delay}s`);
                
                starsContainer.appendChild(star);
            }
        }

        // 主题切换功能
        function initThemeToggle() {
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;
            const icon = themeToggle.querySelector('i');

            // 从localStorage加载主题
            const savedTheme = localStorage.getItem('theme') || 'light';
            body.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);

            themeToggle.addEventListener('click', function() {
                const currentTheme = body.getAttribute('data-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                
                body.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeIcon(newTheme);
            });

            function updateThemeIcon(theme) {
                if (theme === 'dark') {
                    icon.className = 'fas fa-sun';
                } else {
                    icon.className = 'fas fa-moon';
                }
            }
        }

        // 模拟登录状态，设置token
        function setMockToken() {
            localStorage.setItem('token', 'mock-token-123456');
        }

        // 检查登录状态
        function checkLogin() {
            const token = localStorage.getItem('token');
            if (!token) {
                // 显示登录提示
                const postList = document.getElementById('postList');
                postList.innerHTML = `
                    <div class="login-prompt">
                        <h3>请先登录</h3>
                        <p>您需要登录才能查看帖子</p>
                        <button class="login-btn" onclick="setMockToken(); location.reload();">模拟登录</button>
                    </div>
                `;
                return false;
            }
            return token;
        }

        // 加载分类
        function loadCategories() {
            const categoryContainer = document.querySelector('.category-nav .container');
            categoryContainer.innerHTML += '<div class="loading"><div class="spinner"></div></div>';

            fetch('http://localhost:8080/api/categories')
                .then(response => response.json())
                .then(data => {
                    categoryContainer.innerHTML = '<div class="category-item active" data-id="0">全部</div>';
                    if (data.code === 200) {
                        data.data.forEach(category => {
                            const categoryItem = document.createElement('div');
                            categoryItem.className = 'category-item';
                            categoryItem.dataset.id = category.id;
                            categoryItem.textContent = category.name;
                            categoryItem.addEventListener('click', function() {
                                document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
                                this.classList.add('active');
                                loadPosts(1, this.dataset.id);
                            });
                            categoryContainer.appendChild(categoryItem);
                        });
                    }
                })
                .catch(error => {
                    console.error('加载分类失败:', error);
                    categoryContainer.innerHTML = '<div class="category-item active" data-id="0">全部</div>';
                });
        }

        // 加载帖子列表
        function loadPosts(page = 1, categoryId = 0) {
            const token = checkLogin();
            if (!token) return;

            const postList = document.getElementById('postList');
            postList.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            let url = `http://localhost:8080/api/posts?page=${page}&size=10`;
            if (categoryId > 0) {
                url += `&categoryId=${categoryId}`;
            }

            fetch(url, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 200) {
                    postList.innerHTML = '';

                    if (data.data && data.data.list && data.data.list.length > 0) {
                        data.data.list.forEach((post, index) => {
                            const postCard = document.createElement('div');
                            postCard.className = 'post-card';
                            postCard.style.animationDelay = `${1.4 + index * 0.2}s`;
                            postCard.innerHTML = `
                                <div class="post-header">
                                    <div class="post-author">
                                        <div class="author-avatar">
                                            <i class="fas fa-user"></i>
                                        </div>
                                        <div class="author-info">
                                            <span class="author-name">${post.username || '未知'}</span>
                                            <span class="post-time">${post.createdAt || '未知'}</span>
                                        </div>
                                    </div>
                                    <div class="post-category">
                                        <span class="category-tag">${post.categoryName || '未分类'}</span>
                                    </div>
                                </div>
                                <h3 class="post-title"><a href="post-detail.html?id=${post.id}">${post.title || '无标题'}</a></h3>
                                <p class="post-summary">${post.summary || '无摘要'}</p>
                                ${post.imageUrl ? `
                                    <div class="post-image">
                                        <img src="${post.imageUrl}" alt="帖子图片" class="img-fluid rounded">
                                    </div>
                                ` : ''}
                                <div class="post-actions">
                                    <a href="post-detail.html?id=${post.id}" class="action-btn">
                                        <i class="fas fa-eye"></i> ${post.viewCount || 0}
                                    </a>
                                    <a href="post-detail.html?id=${post.id}" class="action-btn">
                                        <i class="fas fa-heart"></i> ${post.likeCount || 0}
                                    </a>
                                    <a href="post-detail.html?id=${post.id}" class="action-btn">
                                        <i class="fas fa-comment"></i> ${post.commentCount || 0}
                                    </a>
                                    <a href="post-detail.html?id=${post.id}" class="action-btn">
                                        <i class="fas fa-share"></i> 分享
                                    </a>
                                </div>
                            `;
                            postList.appendChild(postCard);
                        });

                        // 生成分页
                        generatePagination(data.data.total, data.data.pages, page);
                    } else {
                        postList.innerHTML = '<div class="login-prompt"><h3>暂无帖子</h3><p>还没有任何帖子，快来发布第一个帖子吧！</p></div>';
                    }
                }
            })
            .catch(error => {
                console.error('加载帖子失败:', error);
                postList.innerHTML = '<div class="login-prompt"><h3>加载失败</h3><p>无法加载帖子，请稍后再试</p></div>';
            });
        }

        // 生成分页
        function generatePagination(total, pages, currentPage) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            // 上一页
            const prevLi = document.createElement('li');
            prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
            prevLi.innerHTML = `<a class="page-link" href="#" onclick="loadPosts(${currentPage - 1})">上一页</a>`;
            pagination.appendChild(prevLi);

            // 页码
            for (let i = 1; i <= pages; i++) {
                const li = document.createElement('li');
                li.className = `page-item ${i === currentPage ? 'active' : ''}`;
                li.innerHTML = `<a class="page-link" href="#" onclick="loadPosts(${i})"><span class="sr-only"></span>${i}</a>`;
                pagination.appendChild(li);
            }

            // 下一页
            const nextLi = document.createElement('li');
            nextLi.className = `page-item ${currentPage === pages ? 'disabled' : ''}`;
            nextLi.innerHTML = `<a class="page-link" href="#" onclick="loadPosts(${currentPage + 1})">下一页</a>`;
            pagination.appendChild(nextLi);
        }

        // 加载热门帖子
        function loadHotPosts() {
            const hotPosts = document.getElementById('hotPosts');
            hotPosts.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            fetch('http://localhost:8080/api/posts?page=1&size=5')
                .then(response => response.json())
                .then(data => {
                    hotPosts.innerHTML = '';
                    if (data.code === 200) {
                        if (data.data && data.data.list && data.data.list.length > 0) {
                            data.data.list.forEach(post => {
                                const li = document.createElement('li');
                                li.className = 'list-group-item';
                                li.innerHTML = `<a href="post-detail.html?id=${post.id}">${post.title || '无标题'}</a>`;
                                hotPosts.appendChild(li);
                            });
                        } else {
                            hotPosts.innerHTML = '<li class="list-group-item">暂无热门帖子</li>';
                        }
                    }
                })
                .catch(error => {
                    console.error('加载热门帖子失败:', error);
                    hotPosts.innerHTML = '<li class="list-group-item">加载失败</li>';
                });
        }

        // 页面加载完成后执行
        window.onload = function() {
            generateStars();
            initThemeToggle();
            loadCategories();
            loadPosts();
            loadHotPosts();
        };
    </script>
</body>
</html>
